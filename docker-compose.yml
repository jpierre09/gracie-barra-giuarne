version: '3.8'

services:
  web:
    build: .
    command: sh -c "python manage.py migrate --noinput && gunicorn --bind 0.0.0.0:3000 --workers 3 graciebarra.wsgi:application"
    volumes:
      - .:/app
      - /app/node_modules
      - media_data:/app/media
    ports:
      - "3000:3000"
    environment:
      - DEBUG=1
      - SECRET_KEY=${DJANGO_SECRET_KEY:-django-insecure-graciebarra-guarne-secret-key-2026}
      - DATABASE_URL=postgres://gb_user:gb_password@db:5432/graciebarra_db
      - ALLOWED_HOSTS=*
      - ADMIN_EMAIL=${ADMIN_EMAIL:-profesor@graciebarra.com}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-GracieBarra2026!}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-sample-google-client-id}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-sample-google-client-secret}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=graciebarra_db
      - POSTGRES_USER=gb_user
      - POSTGRES_PASSWORD=gb_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gb_user -d graciebarra_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  media_data:
