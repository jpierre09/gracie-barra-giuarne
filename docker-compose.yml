version: '3.8'

services:
  web:
    build: .
    command: sh -c "python manage.py makemigrations core --noinput && python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn --bind 0.0.0.0:3000 --workers 3 graciebarra.wsgi:application"
    volumes:
      - media_data:/app/media
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - POSTGRES_DB=graciebarra_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_secure_password
      - DATABASE_URL=postgres://postgres:postgres_secure_password@db:5432/graciebarra_db
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=graciebarra_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_secure_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d graciebarra_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  media_data:
