<!DOCTYPE html>
<html lang="es" class="dark h-full bg-slate-950 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gracie Barra Guarne{% endblock %} - Jiu-Jitsu PWA</title>
    <meta name="theme-color" content="#002046">
    <meta name="description" content="Plataforma PWA oficial del equipo Gracie Barra Guarne Jiu-Jitsu">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gb: {
                            blue: '#003366',
                            darkblue: '#002046',
                            red: '#E31B23',
                            lightred: '#FF3B30',
                            accent: '#0055A5'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-full flex flex-col antialiased">
    <!-- Header -->
    <header class="bg-gb-darkblue border-b border-slate-800 sticky top-0 z-40 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 rounded-full bg-gb-red flex items-center justify-center font-extrabold text-white text-lg tracking-wider border-2 border-white/20 shadow-md">
                    GB
                </div>
                <div>
                    <h1 class="font-extrabold text-white text-base leading-none tracking-wide">GRACIE BARRA</h1>
                    <span class="text-xs text-red-400 font-semibold tracking-wider uppercase">GUARNE • JIU-JITSU</span>
                </div>
            </div>
            
            {% if user.is_authenticated %}
            <div class="flex items-center space-x-3">
                <span class="text-xs px-2.5 py-1 rounded-full bg-slate-800 text-slate-300 font-medium border border-slate-700">
                    {{ user.profile.get_role_display }}
                </span>
                <a href="/accounts/logout/" class="text-xs text-slate-400 hover:text-white px-3 py-1.5 rounded-lg border border-slate-700 hover:bg-slate-800 transition">
                    Cerrar Sesión
                </a>
            </div>
            {% endif %}
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-6">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 border-t border-slate-800 py-6 text-center text-xs text-slate-500">
        <div class="max-w-7xl mx-auto px-4">
            <p>© 2026 Gracie Barra Guarne. Organizado para la Excelencia en Jiu-Jitsu.</p>
            <p class="mt-1 text-slate-600">PWA Instalable • Todos los derechos reservados</p>
        </div>
    </footer>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js').then(reg => {
                    console.log('ServiceWorker Gracie Barra PWA registrado:', reg.scope);
                }).catch(err => {
                    console.log('Error registrando ServiceWorker:', err);
                });
            });
        }
    </script>
</body>
</html>
