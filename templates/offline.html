{% extends "base.html" %}

{% block title %}Modo Offline - Gracie Barra Guarne{% endblock %}

{% block content %}
<div class="max-w-md mx-auto my-12 text-center bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl">
    <div class="w-16 h-16 mx-auto rounded-full bg-slate-800 flex items-center justify-center text-slate-400 mb-4">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m-12.728 0a9 9 0 010-12.728m2.828 2.828a5 5 0 017.072 0m-7.072 7.072a5 5 0 017.072 0M12 12h.01"/></svg>
    </div>
    <h2 class="text-xl font-black text-white">Sin Conexión a Internet</h2>
    <p class="text-xs text-slate-400 mt-2">La PWA de Gracie Barra Guarne está en modo offline. Tus datos locales guardados están disponibles.</p>
    <button onclick="window.location.reload()" class="mt-6 bg-gb-red hover:bg-red-700 text-white font-bold py-2.5 px-6 rounded-xl text-xs transition">
        Reintentar Conexión
    </button>
</div>
{% endblock %}
